name: 香港最终自动更新与推送

on:
  schedule:
    # 每周二、四、六 14:00 UTC（香港时间 22:00，即开奖后半小时）
    - cron: '0 14 * * 2,4,6'
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（新增 lightgbm, scikit-learn, numpy）
        run: |
          python -m pip install --upgrade pip
          pip install lightgbm scikit-learn numpy

      - name: 配置 PushPlus Token
        run: echo "PUSHPLUS_TOKEN=${{ secrets.PUSHPLUS_TOKEN }}" >> $GITHUB_ENV

      - name: 初始化数据库（如果不存在）
        run: |
          if [ ! -f "marksix_local.db" ]; then
            python marksix_local.py bootstrap
          fi

      - name: 同步最新开奖并生成预测
        run: |
          python marksix_local.py sync          # 移除 --with-backtest

      - name: 显示结果并推送微信
        run: |
          python marksix_local.py show

      - name: 上传数据库（可选，用于备份）
        uses: actions/upload-artifact@v4
        with:
          name: marksix-db
          path: marksix_local.db
          retention-days: 7
